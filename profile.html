<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김씨네표류기 — 내 프로필</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#131215;--screen:#FAF8F4;--signal:#F4562B;--signal-text:#C7401A;--fog:#E9E5DD;--caption:#6B665D;--placeholder:#A8A29A;
    --serif:'Noto Serif KR','Noto Serif CJK KR','Apple Myungjo',serif;
    --kr:'Pretendard Variable','Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    --mono:'Pretendard Variable','Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--screen);color:var(--ink);font-family:var(--kr);min-height:100svh}
  .wrap{width:min(600px,100%);margin:0 auto;padding:0 20px 96px}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;
    background:var(--screen);padding:16px 0;border-bottom:1px solid var(--fog)}
  .topbar .brand{font-family:var(--serif);font-weight:700;font-size:20px;letter-spacing:-.02em;color:var(--ink);text-decoration:none}
  .gear{position:relative}
  .gear>button{background:none;border:0;cursor:pointer;color:var(--ink);padding:8px;display:flex}
  .gear svg{width:24px;height:24px;display:block}
  .menu{position:absolute;right:0;top:44px;background:#fff;border:1px solid var(--fog);border-radius:12px;
    padding:4px;min-width:160px;box-shadow:0 8px 24px rgba(19,18,21,.1);display:none}
  .menu.open{display:block}
  .menu button{width:100%;text-align:left;background:none;border:0;cursor:pointer;font-family:var(--kr);
    font-size:14px;color:var(--ink);padding:12px;border-radius:8px}
  .menu button:hover{background:var(--screen)}
  .menu button.danger{color:#9C2B12}
  .menu .sep{height:1px;background:var(--fog);margin:4px 0}
  .phead{text-align:center;padding:32px 0 24px}
  .avatar{width:88px;height:88px;border-radius:50%;background:#fff;border:1px solid var(--fog);
    display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 16px}
  .avatar[role="button"]{cursor:pointer;transition:border-color .15s,transform .1s;position:relative}
  .avatar[role="button"]:hover{border-color:var(--ink)}
  .avatar[role="button"]:active{transform:scale(.97)}
  .avatar[role="button"]::after{content:"✎";position:absolute;right:-2px;bottom:-2px;width:26px;height:26px;border-radius:50%;background:var(--ink);color:var(--screen);font-size:13px;display:flex;align-items:center;justify-content:center;border:2px solid var(--screen)}
  .nick{font-family:var(--serif);font-weight:700;font-size:24px;letter-spacing:-.01em}
  .joined{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--placeholder);margin-top:8px}
  .bio{font-size:14px;color:var(--caption);line-height:1.6;margin-top:12px}
  .bio.empty{color:var(--placeholder)}
  .stats{display:flex;justify-content:center;gap:28px;margin-top:20px}
  .stat{text-align:center}
  .stat b{display:block;font-family:var(--serif);font-size:20px;font-weight:700}
  .stat span{font-size:12px;color:var(--caption)}
  .sec{margin-top:32px}
  .sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .sec-h h2{font-size:12px;font-family:var(--mono);letter-spacing:.16em;color:var(--caption);font-weight:600}
  .sec-h a{font-size:12px;color:var(--signal-text);text-decoration:none}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:14px;background:#fff;border:1px solid var(--fog);border-radius:99px;padding:8px 14px;color:var(--ink)}
  .empty-note{font-size:13px;color:var(--placeholder);line-height:1.6}
  .empty-note a{color:var(--signal-text);text-decoration:none}
  /* 포스터 */
  .fav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .pstrip{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px}
  .pcard img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:10px;background:var(--fog);display:block}
  .pcard .noimg{width:100%;aspect-ratio:2/3;border-radius:10px;background:var(--fog);border:1px dashed var(--fog);
    display:flex;align-items:center;justify-content:center;color:var(--placeholder);font-size:22px}
  .pcard .pt{display:block;font-size:11px;line-height:1.3;color:var(--ink);margin-top:4px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .loading{padding:80px 0;text-align:center;color:var(--caption);font-size:14px}
  /* 편집 모달 */
  .overlay{position:fixed;inset:0;background:rgba(19,18,21,.44);display:none;
    align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.open{display:flex}
  .modal{width:min(420px,100%);background:var(--screen);border:1px solid var(--fog);border-radius:18px;
    padding:24px 22px;max-height:90svh;overflow:auto;box-shadow:0 20px 60px rgba(19,18,21,.22)}
  .modal h3{font-family:var(--serif);font-size:20px;font-weight:700;margin-bottom:18px}
  .fld{display:block;margin-bottom:18px}
  .fld>span{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.12em;color:var(--caption);margin-bottom:8px}
  .fld input,.fld textarea{width:100%;font-family:var(--kr);font-size:15px;color:var(--ink);background:#fff;
    border:1px solid var(--fog);border-radius:10px;padding:11px 12px;outline:none;-webkit-appearance:none}
  .fld input:focus,.fld textarea:focus{border-color:var(--ink)}
  .fld textarea{resize:none;line-height:1.6}
  .hint{display:block;font-size:11px;color:var(--placeholder);margin-top:6px;font-style:normal}
  .emoji-row{display:flex;align-items:center;gap:12px}
  .emoji-preview{width:56px;height:56px;flex:0 0 56px;border-radius:50%;background:#fff;border:1px solid var(--fog);
    display:flex;align-items:center;justify-content:center;font-size:28px}
  .emoji-input{flex:1;min-width:0}
  .emoji-picks{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
  .emoji-picks button{width:38px;height:38px;font-size:20px;background:#fff;border:1px solid var(--fog);
    border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
  .emoji-picks button:hover{border-color:var(--ink)}
  .emoji-picks button.on{border-color:var(--signal);box-shadow:inset 0 0 0 1px var(--signal)}
  .avatar{overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover;display:block}
  .emoji-preview{overflow:hidden}
  .emoji-preview img{width:100%;height:100%;object-fit:cover;display:block}
  .ava-actions{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}
  .ava-btn{font-family:var(--kr);font-size:13px;font-weight:600;border:1px solid var(--fog);background:#fff;color:var(--ink);border-radius:9px;padding:9px;cursor:pointer}
  .ava-btn:hover{border-color:var(--ink)}
  .ava-btn.danger{color:#9C2B12}
  .ava-btn:disabled{opacity:.5;cursor:default}
  .modal-err{font-size:13px;color:#9C2B12;min-height:18px;margin-bottom:10px;line-height:1.5}
  .modal-actions{display:flex;gap:10px}
  .btn-ghost,.btn-solid{flex:1;font-family:var(--kr);font-size:15px;font-weight:600;border-radius:99px;
    padding:12px;cursor:pointer;border:1px solid var(--fog)}
  .btn-ghost{background:#fff;color:var(--ink)}
  .btn-solid{background:var(--ink);color:var(--screen);border-color:var(--ink)}
  .btn-solid:disabled{opacity:.5;cursor:default}
  .acct{background:#fff;border:1px solid var(--fog);border-radius:10px;padding:2px 12px}
  .acct-row{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 0;font-size:14px}
  .acct-row + .acct-row{border-top:1px solid var(--fog)}
  .acct-row span{color:var(--caption);flex:0 0 auto}
  .acct-row b{font-weight:600;color:var(--ink);word-break:break-all;text-align:right}
  .sdiv{height:1px;background:var(--fog);margin:2px 0 18px}
  .modal-ok{font-size:13px;color:#2F6B4F;min-height:18px;margin-bottom:10px;line-height:1.5}
  .del-warn{background:#FFF7F4;border:1px solid #F3D9CF;border-radius:12px;padding:14px 16px;margin-bottom:18px}
  .del-warn p{font-size:13.5px;color:var(--ink);font-weight:700;margin-bottom:8px}
  .del-warn ul{margin:0;padding-left:18px}
  .del-warn li{font-size:13px;line-height:1.7;color:var(--caption);margin:5px 0}
  .del-warn li b{color:var(--signal-text)}
  .del-agree{display:flex;align-items:flex-start;gap:8px;font-size:13.5px;color:var(--ink);line-height:1.5;margin-bottom:14px;cursor:pointer}
  .del-agree input{margin-top:2px;flex:0 0 auto;width:16px;height:16px;accent-color:var(--signal)}
  .btn-danger{flex:1;font-family:var(--kr);font-size:15px;font-weight:700;border-radius:99px;padding:12px;cursor:pointer;
    background:#9C2B12;color:#fff;border:1px solid #9C2B12}
  .btn-danger:disabled{opacity:.45;cursor:default}
  /* 본 영화 / 리뷰 */
  .sec-h .add{font-family:var(--kr);font-size:12.5px;color:var(--signal-text);background:none;border:0;cursor:pointer;padding:0}
  .watched{display:flex;flex-direction:column;gap:12px}
  .wm{display:flex;gap:12px;background:#fff;border:1px solid var(--fog);border-radius:14px;padding:12px;cursor:pointer;text-align:left;width:100%;font-family:var(--kr)}
  .wm:hover{border-color:var(--ink)}
  .wm-poster{width:52px;flex:0 0 52px}
  .wm-poster img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:7px;background:var(--fog);display:block}
  .wm-poster .noimg{width:100%;aspect-ratio:2/3;border-radius:7px;background:var(--fog);display:flex;align-items:center;justify-content:center;color:var(--placeholder);font-size:18px}
  .wm-main{flex:1;min-width:0}
  .wm-title{font-size:14.5px;font-weight:600;color:var(--ink);line-height:1.35}
  .wm-title .yr{color:var(--placeholder);font-weight:400;font-size:12.5px;margin-left:4px}
  .wm-ol{font-size:13px;color:var(--caption);line-height:1.5;margin-top:5px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .stars{--p:0%;display:inline-block;font-size:14px;letter-spacing:1px;line-height:1;
    background:linear-gradient(90deg,var(--signal) var(--p),#D9D4CA var(--p));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .stars::before{content:"★★★★★"}
  .wm-rate{display:flex;align-items:center;gap:6px;margin-top:6px}
  .wm-rate .rn{font-family:var(--mono);font-size:11px;color:var(--caption)}
  .ott-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
  .ott-badge{font-size:11px;font-weight:600;color:var(--ink);background:var(--screen);
    border:1px solid var(--fog);border-radius:6px;padding:3px 7px;line-height:1.2}
  .ott-none{font-size:11px;color:var(--placeholder);margin-top:8px}
  /* 별점 입력 */
  .star-row{display:flex;align-items:center;gap:14px}
  .star-pick{position:relative;display:inline-block}
  .star-pick .stars{font-size:34px;letter-spacing:5px}
  .star-zones{position:absolute;inset:0;display:flex}
  .star-zones span{flex:1;cursor:pointer}
  .star-num{font-family:var(--mono);font-size:15px;color:var(--ink);min-width:30px}
  .rev-movie{font-size:15px;font-weight:600;color:var(--ink);margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--fog);line-height:1.4}
  .rev-movie .yr{color:var(--placeholder);font-weight:400;font-size:13px;margin-left:5px}
  /* 검색 모달 */
  .srch-list{max-height:46svh;overflow:auto;margin-bottom:14px}
  .srch-empty{font-size:13px;color:var(--placeholder);padding:16px 2px}
  .srch-item{display:flex;gap:8px;align-items:center;padding:4px;border-radius:10px}
  .srch-item .si-main{display:flex;gap:10px;align-items:center;padding:6px;border-radius:8px;cursor:pointer;flex:1;min-width:0;background:none;border:0;text-align:left;font-family:var(--kr)}
  .srch-item .si-main:hover{background:#fff}
  .srch-item .si-wl{flex:0 0 auto;font-family:var(--kr);font-size:12px;font-weight:600;white-space:nowrap;border:1px solid var(--fog);background:#fff;color:var(--signal-text);border-radius:8px;padding:7px 10px;cursor:pointer}
  .srch-item .si-wl.on{background:var(--signal);color:#fff;border-color:var(--signal)}
  .srch-item .si-wl:disabled{opacity:.5;cursor:default}
  .srch-item img,.srch-item .noimg{width:38px;flex:0 0 38px;aspect-ratio:2/3;object-fit:cover;border-radius:5px;background:var(--fog)}
  .srch-item .noimg{display:flex;align-items:center;justify-content:center;color:var(--placeholder);font-size:14px}
  .srch-item .si-t{font-size:14px;color:var(--ink);line-height:1.3}
  .srch-item .si-y{font-size:12px;color:var(--placeholder)}
  /* 본 영화 포스터 그리드 */
  .watch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .wg{position:relative;cursor:pointer;background:none;border:0;padding:0;font-family:var(--kr);display:block}
  .wg img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:10px;background:var(--fog);display:block}
  .wg .noimg{width:100%;aspect-ratio:2/3;border-radius:10px;background:var(--fog);display:flex;align-items:center;justify-content:center;color:var(--placeholder);font-size:22px}
  .wg .wg-rate{position:absolute;left:6px;bottom:6px;display:inline-flex;align-items:center;gap:3px;background:rgba(19,18,21,.72);color:#fff;border-radius:6px;padding:2px 6px;font-family:var(--mono);font-size:10.5px;font-weight:600}
  .wg .wg-rate .st{color:var(--signal);font-size:10px}
  .wg .wg-eng{position:absolute;right:6px;top:6px;display:flex;gap:4px}
  .wg .wg-eng span{background:rgba(19,18,21,.66);color:#fff;border-radius:6px;padding:1px 5px;font-family:var(--mono);font-size:10px}
  /* 게시물 상세 (인스타식) */
  .post-modal{width:min(460px,100%)}
  .post-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .post-head .pa{width:38px;height:38px;flex:0 0 38px;border-radius:50%;background:#fff;border:1px solid var(--fog);display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden}
  .post-head .pa img{width:100%;height:100%;object-fit:cover}
  .post-head .pn{font-weight:600;font-size:15px;color:var(--ink)}
  .post-head .px{margin-left:auto;background:none;border:0;cursor:pointer;color:var(--caption);font-size:24px;line-height:1;padding:2px 4px}
  .post-hero{display:flex;gap:14px;margin-bottom:14px}
  .post-hero .hp{width:104px;flex:0 0 104px}
  .post-hero .hp img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:10px;background:var(--fog);display:block}
  .post-hero .hp .noimg{width:100%;aspect-ratio:2/3;border-radius:10px;background:var(--fog);display:flex;align-items:center;justify-content:center;color:var(--placeholder);font-size:22px}
  .post-hero .hm{flex:1;min-width:0}
  .post-hero .hm .ht{font-size:15.5px;font-weight:700;color:var(--ink);line-height:1.35}
  .post-hero .hm .ht .yr{color:var(--placeholder);font-weight:400;font-size:13px;margin-left:5px}
  .post-hero .hm .hr{display:flex;align-items:center;gap:7px;margin-top:8px}
  .post-hero .hm .hr .rn{font-family:var(--mono);font-size:12px;color:var(--caption)}
  .post-cap{font-size:14.5px;color:var(--ink);line-height:1.6;margin-bottom:6px}
  .post-cap .ol{font-weight:600}
  .post-cap .bd{color:var(--caption);margin-top:6px;white-space:pre-wrap}
  .post-actions{display:flex;align-items:center;gap:10px;padding:12px 0;margin-top:8px;border-top:1px solid var(--fog);border-bottom:1px solid var(--fog)}
  .lk{display:inline-flex;align-items:center;gap:6px;background:none;border:0;cursor:pointer;font-family:var(--kr);color:var(--ink);padding:2px}
  .lk svg{width:23px;height:23px;display:block;stroke:var(--ink);fill:none;stroke-width:1.7;transition:transform .1s}
  .lk.on svg{fill:var(--signal);stroke:var(--signal)}
  .lk:active svg{transform:scale(.84)}
  .lk:disabled{cursor:default;opacity:.45}
  .cmt .cmeta button:disabled{cursor:default;opacity:.45}
  .lk .lc{font-family:var(--mono);font-size:13px;min-width:8px}
  .post-actions .cc{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;color:var(--caption)}
  .post-actions .edit{margin-left:auto;font-size:13px;color:var(--signal-text);background:none;border:0;cursor:pointer;font-family:var(--kr)}
  .cmt-list{margin:14px 0 4px;display:flex;flex-direction:column;gap:15px;max-height:34svh;overflow:auto}
  .cmt{display:flex;gap:10px}
  .cmt .ca{width:30px;height:30px;flex:0 0 30px;border-radius:50%;background:#fff;border:1px solid var(--fog);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden}
  .cmt .ca img{width:100%;height:100%;object-fit:cover}
  .cmt .cmain{flex:1;min-width:0}
  .cmt .cn{font-weight:600;font-size:13px;color:var(--ink)}
  .cmt .cb{font-size:13.5px;color:var(--ink);line-height:1.5;margin-top:2px;word-break:break-word}
  .cmt .cmeta{display:flex;align-items:center;gap:14px;margin-top:5px;font-size:11px;color:var(--placeholder)}
  .cmt .cmeta button{background:none;border:0;cursor:pointer;font-size:11px;color:var(--placeholder);font-family:var(--kr);padding:0}
  .cmt .cmeta button.clk.on{color:var(--signal-text);font-weight:600}
  .cmt-empty{font-size:13px;color:var(--placeholder);padding:6px 0}
  .cmt-err{font-size:12px;color:#9C2B12;min-height:0;margin-top:8px}
  .cmt-add{display:flex;gap:8px;align-items:flex-end;margin-top:12px;border-top:1px solid var(--fog);padding-top:14px}
  .cmt-add textarea{flex:1;font-family:var(--kr);font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--fog);border-radius:10px;padding:9px 11px;outline:none;resize:none;line-height:1.5;max-height:100px}
  .cmt-add textarea:focus{border-color:var(--ink)}
  .cmt-add button{flex:0 0 auto;font-family:var(--kr);font-size:14px;font-weight:600;background:var(--ink);color:var(--screen);border:0;border-radius:10px;padding:10px 16px;cursor:pointer}
  .cmt-add button:disabled{opacity:.4;cursor:default}
  .stat.fstat{cursor:pointer}
  .fl-modal{width:min(420px,100%)}
  .fl-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .fl-head h3{font-family:var(--serif);font-size:19px;font-weight:700}
  .fl-head .px{background:none;border:0;cursor:pointer;color:var(--caption);font-size:24px;line-height:1;padding:2px 4px}
  .fl-list{display:flex;flex-direction:column;gap:2px;max-height:60svh;overflow:auto}
  .fl-row{display:flex;align-items:center;gap:11px;padding:9px 6px;cursor:pointer;border-radius:10px}
  .fl-row:hover{background:#fff}
  .fl-av{width:40px;height:40px;flex:0 0 40px;border-radius:50%;background:#fff;border:1px solid var(--fog);display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
  .fl-av img{width:100%;height:100%;object-fit:cover}
  .fl-nk{flex:1;min-width:0;font-size:14.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fl-btn{flex:0 0 auto;font-family:var(--kr);font-size:12.5px;font-weight:600;border-radius:8px;padding:7px 14px;cursor:pointer;border:1px solid var(--ink);background:var(--ink);color:var(--screen)}
  .fl-btn.on{background:#fff;color:var(--ink);border-color:var(--fog)}
  .fl-btn:disabled{opacity:.5}
  .fl-empty{font-size:13px;color:var(--placeholder);padding:26px 4px;text-align:center}
  @media (max-width:480px){ .wrap{padding:0 16px 80px} .modal{padding:22px 18px} }
</style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">

<body>
  <div class="wrap">
    <div class="topbar">

<script>
const API = "https://api.kim-cine-pyoryugi.kr";
const GENRE={28:"액션",12:"모험",16:"애니메이션",35:"코미디",80:"범죄",99:"다큐",18:"드라마",10751:"가족",14:"판타지",36:"역사",27:"공포",10402:"음악",9648:"미스터리",10749:"로맨스",878:"SF",53:"스릴러",10752:"전쟁",37:"서부"};
const OTT={netflix:"넷플릭스",tving:"티빙",coupang:"쿠팡플레이",wavve:"웨이브",disney:"디즈니+",watcha:"왓챠",laftel:"라프텔",appletv:"Apple TV+"};

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const state = { me:{}, pf:{}, det:{}, reviews:[], providers:{}, rt:null };

async function api(path, opts){
  const r = await fetch(API + path, Object.assign({ credentials:"include", headers:{ "Content-Type":"application/json" } }, opts||{}));
  return { status:r.status, data: await r.json().catch(()=>({})) };
}
async function fetchDetails(ids){
  if(!ids.length) return {};
  const { data } = await api("/api/movies/details?ids=" + ids.join(","));
  const map = {}; (data.results||[]).forEach(m => map[m.tmdb_id]=m); return map;
}
function posterNode(m){
  const d = document.createElement("div"); d.className="pcard";
  const poster = (m && m.poster) ? m.poster.replace("/w342","/w185") : "";
  d.innerHTML = (poster ? ('<img loading="lazy" src="'+esc(poster)+'" alt="">') : '<div class="noimg">🎬</div>')
    + '<span class="pt">'+ esc(m && m.title || "") +'</span>';

}
async function fetchProviders(ids){

function buildPicks(){

    b.onclick = () => { $("fEmoji").value = e; syncEmoji(); };

}
function updateAvaPreview(){
  const av = state.me && state.me.avatar_url;
  if(av){ $("ePrev").innerHTML = '<img src="'+esc(av)+'" alt="">'; $("avaDel").style.display=""; }
  else { $("ePrev").textContent = ($("fEmoji").value.trim() || "🐥"); $("avaDel").style.display="none"; }
}
function syncEmoji(){
  const v = $("fEmoji").value.trim();
  [...$("ePicks").children].forEach(b => b.classList.toggle("on", b.textContent === v));
  updateAvaPreview();
}
function fileToAvatarDataURL(file, size){
  size = size || 256;
  return new Promise((resolve, reject) => {
    if(!/^image\//.test(file.type)) return reject(new Error("이미지 파일만 올릴 수 있어요."));
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      URL.revokeObjectURL(url);
      const c = document.createElement("canvas"); c.width = size; c.height = size;
      const ctx = c.getContext("2d");
      const s = Math.min(img.width, img.height);
      ctx.drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, size, size);
      resolve(c.toDataURL("image/jpeg", 0.85));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("이미지를 불러오지 못했어요.")); };
    img.src = url;
  });
}
async function onAvaFile(e){
  const file = e.target.files && e.target.files[0];
  e.target.value = "";
  if(!file) return;
  $("eErr").textContent = "";
  let dataUrl;
  try { dataUrl = await fileToAvatarDataURL(file); }
  catch(err){ $("eErr").textContent = err.message || "이미지를 처리하지 못했어요."; return; }
  const btn = $("avaPick"); btn.disabled = true; btn.textContent = "올리는 중…";
  const { status, data } = await api("/api/avatar", { method:"POST", body: JSON.stringify({ avatar: dataUrl }) });
  btn.disabled = false;
  if(status !== 200 || !data.ok){ btn.textContent = (state.me && state.me.avatar_url) ? "사진 바꾸기" : "사진 올리기"; $("eErr").textContent = (data && data.error) || "사진 업로드에 실패했어요."; return; }
  state.me.avatar_url = data.avatar_url;
  btn.textContent = "사진 바꾸기";
  updateAvaPreview();
  render();
}
async function onAvaDelete(){
  const btn = $("avaDel"); btn.disabled = true;

  btn.disabled = false;
  if(status !== 200 || !data.ok){ $("eErr").textContent = (data && data.error) || "삭제에 실패했어요."; return; }
  state.me.avatar_url = null;
  $("avaPick").textContent = "사진 올리기";
  updateAvaPreview();
  render();
}

async function saveEdit(){
  const nickname = $("fNick").value.trim();
  const bio = $("fBio").value;
  const emoji = $("fEmoji").value.trim();
  $("eErr").textContent = "";

  if(/\d{7,}/.test(nickname)){ $("eErr").textContent = "닉네임에 전화번호처럼 보이는 숫자열은 쓸 수 없어요."; $("fNick").focus(); return; }
  const btn = $("eSave"); btn.disabled = true; btn.textContent = "저장 중…";
  const { status, data } = await api("/api/profile", { method:"POST", body: JSON.stringify({ nickname, bio, emoji }) });

  if(status !== 200 || !data.ok){ $("eErr").textContent = (data && data.error) || "저장에 실패했어요. 잠시 후 다시 시도해주세요."; return; }
  state.me = data.user || state.me;
  render();
  closeEdit();
}

async function savePw(){

  if(!cur){ $("sErr").textContent="현재 비밀번호를 입력해주세요."; $("pCur").focus(); return; }

  if(nw!==nw2){ $("sErr").textContent="새 비밀번호가 서로 달라요."; $("pNew2").focus(); return; }
  const btn=$("sSave"); btn.disabled=true; btn.textContent="변경 중…";

let curRating = 0;
function paintStars(v){
  v = Math.max(0, Math.min(10, v||0));
  $("starFill").style.setProperty("--p", (v*10) + "%");
  $("starNum").textContent = v ? (v/2).toFixed(1) : "–";
}
function buildStarZones(){
  const z = $("starZones"); z.innerHTML = "";
  for(let k=1;k<=10;k++){
    const sp = document.createElement("span"); sp.dataset.v = k;
    sp.addEventListener("mouseenter", () => paintStars(k));
    sp.addEventListener("click", () => { curRating = k; paintStars(k); });
    z.appendChild(sp);
  }
  z.addEventListener("mouseleave", () => paintStars(curRating));
}

async function saveReview(){

  $("rErr").textContent = "";

  const want = !btn.classList.contains("on");

function derivedGenres(){
  const det = state.det || {}, pf = state.pf || {};
  const ids = [].concat(
    (pf.favorites||[]).map(f=>f.tmdb_id),
    (state.reviews||[]).map(r=>r.tmdb_id),
    (pf.watchlist||[]).map(w=>w.tmdb_id)
  );
  const count = {};
  ids.forEach(id => { const m = det[id]; if(m && Array.isArray(m.genres)) m.genres.forEach(g => { count[g] = (count[g]||0)+1; }); });
  let top = Object.keys(count).map(Number).sort((a,b)=> (count[b]-count[a]) || (a-b)).slice(0,6);
  if(!top.length) top = (pf.genres||[]);
  return top;
}

/* ---- 게시물 상세 (인스타식: 좋아요·댓글) ---- */
const HEART = '<svg viewBox="0 0 24 24"><path d="M12 21s-7.6-4.7-10.1-9.3C.3 8.4 2 4.8 5.4 4.8c2 0 3.4 1.2 4.3 2.5l.3.4.3-.4c.9-1.3 2.3-2.5 4.3-2.5 3.4 0 5.1 3.6 3.5 6.9C19.6 16.3 12 21 12 21z"/></svg>';
function fmtTime(ts){
  if(!ts) return "";
  const t = Date.parse(String(ts).replace(" ","T")+"Z"); if(isNaN(t)) return "";
  const diff = (Date.now()-t)/1000;
  if(diff<60) return "방금";
  if(diff<3600) return Math.floor(diff/60)+"분 전";
  if(diff<86400) return Math.floor(diff/3600)+"시간 전";
  if(diff<2592000) return Math.floor(diff/86400)+"일 전";
  return String(ts).slice(0,10).replace(/-/g,".");
}

function closePost(){ $("overlayPost").classList.remove("open"); post.id=null; post.data=null; }

function renderComments(){

async function togglePostLike(){
  if(post.busy || !post.data) return; post.busy = true;
  const d = post.data; const want = !d.liked_by_me;
  const { status, data } = await api(want?"/api/like":"/api/unlike", { method:"POST", body: JSON.stringify({ type:"review", id: d.review.id }) });
  post.busy = false;
  if(status===200 && data.ok){
    d.liked_by_me = data.liked; d.like_count = data.count;
    const btn=$("postLike"), c=$("postLikeC"); if(btn) btn.classList.toggle("on", data.liked); if(c) c.textContent = data.count;

async function toggleCommentLike(c){
  if(post.busy) return; post.busy = true;
  const want = !c.liked_by_me;
  const { status, data } = await api(want?"/api/like":"/api/unlike", { method:"POST", body: JSON.stringify({ type:"comment", id: c.id }) });
  post.busy = false;
  if(status===200 && data.ok){ c.liked_by_me = data.liked; c.like_count = data.count; renderComments(); }
}
async function sendComment(){
  if(post.busy || !post.data) return;
  const ta = $("cmtInput"); const body = (ta.value||"").trim();
  if(!body){ return; }
  post.busy = true; const btn = $("cmtSend"); btn.disabled = true;
  const { status, data } = await api("/api/comments", { method:"POST", body: JSON.stringify({ review_id: post.data.review.id, body }) });
  post.busy = false; btn.disabled = false;
  if(status===200 && data.ok && data.comment){
    post.data.comments.push(data.comment);
    ta.value = ""; ta.style.height = "auto";
    $("postCmtC").textContent = post.data.comments.length;
    const rv = (state.reviews||[]).find(x=>x.id===post.data.review.id); if(rv) rv.comment_count = (rv.comment_count||0)+1;
    renderComments();
    const list=$("cmtList"); if(list) list.scrollTop = list.scrollHeight;
  } else {
    $("cmtErr").textContent = (data && data.error) || "댓글 등록에 실패했어요.";
  }
}
async function removeComment(c){
  if(post.busy) return; post.busy = true;
  const { status, data } = await api("/api/comments/delete", { method:"POST", body: JSON.stringify({ id: c.id }) });
  post.busy = false;
  if(status===200 && data.ok){
    post.data.comments = (post.data.comments||[]).filter(x=>x.id!==c.id);
    const cc=$("postCmtC"); if(cc) cc.textContent = post.data.comments.length;
    const rv = (state.reviews||[]).find(x=>x.id===post.data.review.id); if(rv) rv.comment_count = Math.max(0,(rv.comment_count||1)-1);
    renderComments();
  }
}

    const av = u.avatar_url ? '<img src="'+esc(u.avatar_url)+'" alt="">' : esc(u.emoji||"🐥");
    const btn = u.is_me ? '' : '<button class="fl-btn'+(u.is_following?' on':'')+'" type="button">'+(u.is_following?'팔로잉':'팔로우')+'</button>';
    row.innerHTML = '<div class="fl-av">'+av+'</div><div class="fl-nk">'+esc(u.nickname)+'</div>'+btn;
    row.onclick = () => { location.href = "/u.html?u="+encodeURIComponent(u.nickname); };
    const b = row.querySelector(".fl-btn");
    if(b){ b.onclick = (e) => { e.stopPropagation(); toggleFollowRow(u, b); }; }
    box.appendChild(row);
  });
}
async function toggleFollowRow(u, btn){
  btn.disabled = true;
  const { status, data } = await api(u.is_following?"/api/unfollow":"/api/follow", { method:"POST", body: JSON.stringify({ nick: u.nickname }) });
  btn.disabled = false;
  if(status===200 && data.ok){ u.is_following = !!data.following; btn.classList.toggle("on", u.is_following); btn.textContent = u.is_following ? '팔로잉' : '팔로우'; }
}
$("overlayFollows").addEventListener("click", (e) => { if(e.target === $("overlayFollows")) closeFollows(); });
$("flX").onclick = closeFollows;

function render(){
  const me = state.me || {}, pf = state.pf || {}, det = state.det || {};
  const body = $("body"); body.innerHTML = "";

  const head = document.createElement("div"); head.className="phead";
  const joined = (me.created_at||"").slice(0,7).replace("-",".");
  head.innerHTML =
    (me.avatar_url ? '<div class="avatar" id="myAvatar"><img src="'+esc(me.avatar_url)+'" alt=""></div>' : '<div class="avatar" id="myAvatar">'+ esc(me.emoji || "🐥") +'</div>') +
    '<div class="nick">'+ esc(me.nickname||"선원") +'</div>' +
    (joined? '<div class="joined">'+esc(joined)+' 승선</div>':'') +
    '<div class="bio'+(me.bio?'':' empty')+'">'+ (me.bio? esc(me.bio) : "자기소개가 아직 없어요.") +'</div>' +
    '<div class="stats">' +
      '<div class="stat"><b>'+ (state.reviews||[]).length +'</b><span>본 영화</span></div>' +
      '<div class="stat fstat" data-ft="followers"><b>'+ (me.followers||0) +'</b><span>팔로워</span></div>' +
      '<div class="stat fstat" data-ft="following"><b>'+ (me.following||0) +'</b><span>팔로잉</span></div>' +
    '</div>';
  body.appendChild(head);
  const _av = document.getElementById("myAvatar");
  if(_av){ _av.setAttribute("role","button"); _av.title="프로필 사진 변경"; _av.onclick = openEdit; }
  head.querySelectorAll("[data-ft]").forEach(el => { el.onclick = () => openFollows(el.dataset.ft, state.me.nickname); });

  // 최애 영화 (실제 포스터)
  const favIds = (pf.favorites||[]).map(f=>f.tmdb_id);
  let favNode = null;
  if(favIds.length){
    favNode = document.createElement("div");
    const grid = document.createElement("div"); grid.className="fav-grid";
    favIds.slice(0,6).forEach(id => grid.appendChild(posterNode(det[id])));
    favNode.appendChild(grid);
  }
  body.appendChild(section("최애 영화", "/onboarding.html", favNode, '아직 없어요 · <a href="/onboarding.html">고르기</a>'));

  // 본 영화 (한줄평·후기·OTT)
  body.appendChild(watchedSection());

  // 취향
  body.appendChild(section("관심 장르", null, chipRow(derivedGenres(), v=>GENRE[v]||("장르"+v)), '영화를 아카이브하면 관심 장르가 자동으로 생겨요 · <a href="/onboarding.html">영화 고르기</a>'));
  body.appendChild(section("이용 OTT", "/onboarding.html", chipRow(pf.providers, v=>OTT[v]||v), '아직 설정 안 함 · <a href="/onboarding.html">고르기</a>'));
  body.appendChild(section("자주 가는 영화관", "/onboarding.html", chipRow((pf.theaters||[]).map(x=>x.chain), v=>CHAIN[v]||v), '아직 설정 안 함 · <a href="/onboarding.html">고르기</a>'));

  // 보고싶어요 (포스터 스트립 · 누르면 '봤어요' 기록)
  const watchIds = (pf.watchlist||[]).map(w=>w.tmdb_id);
  let wlNode = null;
  if(watchIds.length){
    wlNode = document.createElement("div");
    const strip = document.createElement("div"); strip.className="pstrip";
    watchIds.slice(0,12).forEach(id => {
      const m = det[id] || {};
      const p = posterNode(m);
      p.style.cursor = "pointer"; p.title = "봤어요 · 기록하기";
      p.onclick = () => openReview({ tmdb_id: id, title: (m.title||("영화 #"+id)), year: m.year, poster: m.poster }, null);
      strip.appendChild(p);
    });
    const hint = document.createElement("div"); hint.className="empty-note"; hint.style.marginTop="8px";
    hint.textContent = "포스터를 누르면 '봤어요'로 기록할 수 있어요.";
    wlNode.appendChild(strip); wlNode.appendChild(hint);
  }
  body.appendChild(section("보고싶어요", null, wlNode, '아직 없어요 · <a href="/onboarding.html">고르기</a>'));
}

(async () => {
  const me = await api("/api/me");
  if (me.status === 401 || !me.data.ok) { location.href = "/auth.html?mode=login"; return; }
  const [pf, rv] = await Promise.all([ api("/api/prefs"), api("/api/reviews") ]);
  const pfData = (pf.data && pf.data.ok) ? pf.data : {};
  const reviews = (rv.data && rv.data.ok) ? (rv.data.reviews || []) : [];
  const revIds = reviews.map(r => r.tmdb_id);
  const ids = [...new Set([].concat((pfData.favorites||[]).map(f=>f.tmdb_id), (pfData.watchlist||[]).map(w=>w.tmdb_id), revIds))];
  const [det, providers] = await Promise.all([
    ids.length ? fetchDetails(ids) : Promise.resolve({}),
    revIds.length ? fetchProviders(revIds) : Promise.resolve({}),
  ]);
  state.me = me.data.user || {}; state.pf = pfData; state.det = det; state.reviews = reviews; state.providers = providers;
  if(state.me.is_admin){ const a=$("mAdmin"); if(a){ a.style.display=""; a.onclick=()=>location.href="/admin.html"; } }
  render();
})();
</script>
</body>
</html>
