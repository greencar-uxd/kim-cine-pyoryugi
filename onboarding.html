<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김씨네표류기 — 취향 설정</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#131215;--screen:#FAF8F4;--signal:#F4562B;--signal-text:#C7401A;--fog:#E9E5DD;--caption:#6B665D;--placeholder:#A8A29A;
    --serif:'Noto Serif KR','Noto Serif CJK KR','Apple Myungjo',serif;
    --kr:'Pretendard Variable','Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    --mono:'Pretendard Variable','Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--screen);color:var(--ink);font-family:var(--kr);min-height:100svh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px 80px}
  .brand{font-family:var(--serif);font-weight:700;font-size:20px;letter-spacing:-.02em;text-decoration:none;color:var(--ink)}
  .card{width:min(460px,94vw);background:#fff;border:1px solid var(--fog);border-radius:16px;padding:32px 28px;margin-top:20px}
  .prog{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--caption);margin-bottom:12px}
  .bar{height:4px;background:var(--fog);border-radius:99px;overflow:hidden;margin-bottom:24px}
  .bar>i{display:block;height:100%;background:var(--signal);border-radius:99px;transition:width .3s ease}
  h1{font-family:var(--serif);font-weight:700;font-size:24px;letter-spacing:-.01em;margin-bottom:8px}
  .sub{font-size:14px;color:var(--caption);line-height:1.6;margin-bottom:24px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{font-size:16px;font-family:var(--kr);color:var(--ink);background:var(--screen);border:1px solid #DDD8CD;border-radius:12px;padding:12px 16px;cursor:pointer;user-select:none;transition:border-color .12s,background .12s}
  .chip:hover{border-color:var(--caption)}
  .chip.sel{border-color:var(--signal);background:#FDEEE6;color:var(--signal-text);font-weight:700}
  .allrow{margin-top:16px}
  .linkbtn{background:none;border:0;color:var(--caption);font-size:12px;font-family:var(--kr);cursor:pointer;text-decoration:underline;text-underline-offset:2px;padding:0}
  .linkbtn:hover{color:var(--signal-text)}
  .soon{font-size:14px;color:var(--caption);line-height:1.7;background:var(--screen);border:1px dashed var(--fog);border-radius:12px;padding:20px;text-align:center}
  /* 검색 · 포스터 그리드 */
  .srch{display:flex;gap:8px;margin-bottom:12px}
  .srch input{flex:1;border:1px solid #DDD8CD;border-radius:12px;background:var(--screen);padding:12px 16px;font-size:16px;font-family:var(--kr);color:var(--ink)}
  .srch input::placeholder{color:var(--placeholder)}
  .srch input:focus{outline:none;border-color:var(--ink)}
  .srchbtn{background:var(--ink);color:var(--screen);border:0;border-radius:12px;padding:0 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--kr)}
  .chosen{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;min-height:8px}
  .chosen-chip{font-size:12px;background:#FDEEE6;color:var(--signal-text);border:1px solid var(--signal);border-radius:99px;padding:6px 10px;cursor:pointer;font-family:var(--kr)}
  .chosen-chip b{font-weight:700;margin-left:4px}
  .chosen-empty{font-size:12px;color:var(--placeholder)}
  .movie-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(84px,1fr));gap:8px;max-height:360px;overflow-y:auto}
  .movie{position:relative;background:none;border:0;padding:0;cursor:pointer;text-align:left;font-family:var(--kr)}
  .movie img,.movie .noimg{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:8px;border:2px solid transparent;display:block;background:var(--fog)}
  .movie .noimg{display:flex;align-items:center;justify-content:center;font-size:22px}
  .movie .mt{display:block;font-size:11px;line-height:1.3;color:var(--ink);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .movie .mt em{color:var(--caption);font-style:normal}
  .movie .chk{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--signal);color:#fff;font-size:12px;display:none;align-items:center;justify-content:center}
  .movie.sel img{border-color:var(--signal)}
  .movie.sel .chk{display:flex}
  .ghint{font-size:12px;color:var(--caption);margin-top:12px;text-align:center}
  .actions{display:flex;align-items:center;gap:12px;margin-top:32px}
  .btn{flex:1;background:var(--ink);color:var(--screen);border:0;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--kr)}
  .btn:disabled{opacity:.5;cursor:wait}
  .back{background:none;border:1px solid #DDD8CD;color:var(--caption);border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:var(--kr);width:64px}
  .skip{margin-top:16px;text-align:center}
  .msg{margin-top:16px;font-size:14px;line-height:1.6;border-radius:12px;padding:12px 16px;display:none}
  .msg.err{display:block;background:#FBEAE4;color:#9C2B12}
  .done h1{margin-bottom:12px}
  .done .go{display:inline-block;margin-top:8px;background:var(--ink);color:var(--screen);text-decoration:none;border-radius:12px;padding:14px 24px;font-size:16px;font-weight:700}
  .foot{margin-top:24px;font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:var(--caption)}
  @media (max-width:480px){body{padding:24px 16px 64px}.card{padding:24px 20px}}
</style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
</head>
<body>
  <a class="brand" href="/">김씨네표류기</a>

  <form class="card" id="card" onsubmit="return false">
    <div class="prog"><span id="progLabel">1 / 5</span><span id="progName">영화관</span></div>
    <div class="bar"><i id="progFill" style="width:20%"></i></div>
    <h1 id="stepTitle">자주 가는 영화관</h1>
    <p class="sub" id="stepSub"></p>
    <div id="content"></div>
    <div class="msg" id="msg"></div>
    <div class="actions">
      <button type="button" class="back" id="backBtn" style="display:none">←</button>
      <button type="button" class="btn" id="nextBtn">다음</button>
    </div>
    <div class="skip"><button type="button" class="linkbtn" id="skipBtn">이 단계 건너뛰기</button></div>
  </form>

  <div class="foot">KIM CINE PYORYUGI</div>

<script>
const API = "https://api.kim-cine-pyoryugi.kr";

const STEPS = [
  { key:"theaters",  name:"영화관",   title:"자주 가는 영화관",        sub:"가까운 모임을 추천하려고 물어봐요. 여러 개 골라도 좋아요.", type:"chips", allowAll:true,
    options:[{v:"CGV",t:"CGV"},{v:"LOTTE",t:"롯데시네마"},{v:"MEGABOX",t:"메가박스"},{v:"ETC",t:"기타"}] },
  { key:"providers", name:"OTT",      title:"이용하는 OTT",            sub:"구독 중인 곳을 골라요. 어디서 볼 수 있는지 맞춰줄게요.", type:"chips", allowAll:true,
    options:[{v:"netflix",t:"넷플릭스"},{v:"tving",t:"티빙"},{v:"coupang",t:"쿠팡플레이"},{v:"wavve",t:"웨이브"},{v:"disney",t:"디즈니+"},{v:"watcha",t:"왓챠"},{v:"laftel",t:"라프텔"},{v:"appletv",t:"Apple TV+"}] },
  { key:"favorites", name:"최애 영화", title:"최애 영화 3편",           sub:"검색해서 인생 영화를 골라요. 프로필 대문이 돼요.",   type:"search" },
  { key:"watchlist", name:"보고싶어요", title:"지금 보고 싶은 영화 3편", sub:"현재 상영·개봉 예정 중에서 골라요. 같이 볼 사람도 찾아줄게요.", type:"grid" },
];

const sel = { theaters:new Set(), providers:new Set(), favorites:[], watch:new Map() };
const prefillWatch = new Set();
let gridCache = null;
let i = 0;

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function showErr(t){ const m=$("msg"); m.className="msg err"; m.textContent=t; }
function clearErr(){ const m=$("msg"); m.className="msg"; m.textContent=""; }

async function api(path, opts){
  const r = await fetch(API + path, Object.assign({ credentials:"include", headers:{ "Content-Type":"application/json" } }, opts||{}));
  return { status:r.status, data: await r.json().catch(()=>({})) };
}

function movieCard(m, selected){
  const card = document.createElement("button");
  card.type = "button"; card.className = "movie" + (selected?" sel":""); card.dataset.tid = m.tmdb_id;
  const poster = m.poster ? m.poster.replace("/w342","/w185") : "";
  const img = poster ? ('<img loading="lazy" src="'+esc(poster)+'" alt="">') : '<div class="noimg">🎬</div>';
  card.innerHTML = img + '<span class="mt">'+esc(m.title)+(m.year?(' <em>'+esc(m.year)+'</em>'):'')+'</span><span class="chk">✓</span>';
  return card;
}

/* ---- 4단계: 최애 영화 (검색) ---- */
function renderChosen(){
  const el = $("favChosen"); if(!el) return; el.innerHTML = "";
  if(!sel.favorites.length){ el.innerHTML = '<span class="chosen-empty">아직 고른 영화가 없어요 · 3편 추천</span>'; return; }
  sel.favorites.forEach(m => {
    const c = document.createElement("span"); c.className = "chosen-chip";
    c.innerHTML = esc(m.title) + ' <b>×</b>';
    c.onclick = () => { sel.favorites = sel.favorites.filter(f => f.tmdb_id !== m.tmdb_id); renderChosen(); syncFavCards(); };
    el.appendChild(c);
  });
}
function syncFavCards(){
  document.querySelectorAll('#favResults .movie').forEach(card => {
    const tid = parseInt(card.dataset.tid,10);
    card.classList.toggle('sel', sel.favorites.some(f => f.tmdb_id === tid));
  });
}
function toggleFav(m, card){
  const idx = sel.favorites.findIndex(f => f.tmdb_id === m.tmdb_id);
  if(idx >= 0){ sel.favorites.splice(idx,1); card.classList.remove("sel"); }
  else {
    if(sel.favorites.length >= 5){ showErr("최대 5편까지 고를 수 있어요."); return; }
    sel.favorites.push({tmdb_id:m.tmdb_id, title:m.title, year:m.year, poster:m.poster}); card.classList.add("sel");
  }
  clearErr(); renderChosen();
}
async function doFavSearch(q){
  q = (q||"").trim(); if(!q) return;
  const res = $("favResults"), hint = $("favHint");
  hint.textContent = "검색 중…"; res.innerHTML = "";
  const { data } = await api("/api/movies/search?q=" + encodeURIComponent(q));
  if(!data.ok){ hint.textContent = data.error || "검색에 실패했어요."; return; }
  const rs = (data.results||[]).slice(0,18);
  hint.textContent = rs.length ? "" : "결과가 없어요. 다른 제목으로 검색해보세요.";
  rs.forEach(m => {
    const card = movieCard(m, sel.favorites.some(f => f.tmdb_id === m.tmdb_id));
    card.onclick = () => toggleFav(m, card);
    res.appendChild(card);
  });
}

/* ---- 5단계: 보고싶어요 (현재상영·개봉예정 그리드) ---- */
function toggleWatch(m, card){
  if(sel.watch.has(m.tmdb_id)){ sel.watch.delete(m.tmdb_id); card.classList.remove("sel"); }
  else {
    if(sel.watch.size >= 12){ showErr("최대 12편까지 고를 수 있어요."); return; }
    sel.watch.set(m.tmdb_id, m); card.classList.add("sel");
  }
  clearErr();
}
async function loadGrid(){
  const status = $("gridStatus"), grid = $("gridResults");
  if(!gridCache){
    const [np, up] = await Promise.all([ api("/api/movies/now_playing"), api("/api/movies/upcoming") ]);
    const seen = new Set(), merged = [];
    [...((np.data&&np.data.results)||[]), ...((up.data&&up.data.results)||[])].forEach(m => {
      if(m && m.poster && !seen.has(m.tmdb_id)){ seen.add(m.tmdb_id); merged.push(m); }
    });
    gridCache = merged;
    gridCache.forEach(m => { if(prefillWatch.has(m.tmdb_id) && !sel.watch.has(m.tmdb_id)) sel.watch.set(m.tmdb_id, m); });
  }
  if(!status || !grid) return;
  status.textContent = gridCache.length ? "" : "지금은 표시할 작품이 없어요. 건너뛰어 주세요.";
  grid.innerHTML = "";
  gridCache.forEach(m => {
    const card = movieCard(m, sel.watch.has(m.tmdb_id));
    card.onclick = () => toggleWatch(m, card);
    grid.appendChild(card);
  });
}

function render(){
  const s = STEPS[i];
  $("progLabel").textContent = (i+1) + " / " + STEPS.length;
  $("progName").textContent = s.name;
  $("progFill").style.width = Math.round((i+1)/STEPS.length*100) + "%";
  $("stepTitle").textContent = s.title;
  $("stepSub").textContent = s.sub;
  $("backBtn").style.display = i>0 ? "block" : "none";
  $("nextBtn").textContent = (i === STEPS.length-1) ? "완료" : "다음";
  clearErr();

  const c = $("content"); c.innerHTML = "";
  if (s.type === "chips") {
    const wrap = document.createElement("div"); wrap.className = "chips";
    s.options.forEach(o => {
      const b = document.createElement("button");
      b.type = "button"; b.className = "chip" + (sel[s.key].has(o.v) ? " sel" : ""); b.textContent = o.t;
      b.onclick = () => { sel[s.key].has(o.v) ? sel[s.key].delete(o.v) : sel[s.key].add(o.v); render(); };
      wrap.appendChild(b);
    });
    c.appendChild(wrap);
    if (s.allowAll) {
      const all = document.createElement("div"); all.className = "allrow";
      const ab = document.createElement("button"); ab.type="button"; ab.className="linkbtn";
      const isAll = s.options.every(o => sel[s.key].has(o.v));
      ab.textContent = isAll ? "전체 해제" : "전체 선택";
      ab.onclick = () => { isAll ? sel[s.key].clear() : s.options.forEach(o=>sel[s.key].add(o.v)); render(); };
      all.appendChild(ab); c.appendChild(all);
    }
  } else if (s.type === "search") {
    const bar = document.createElement("div"); bar.className = "srch";
    const inp = document.createElement("input"); inp.type="text"; inp.placeholder="영화 제목으로 검색"; inp.autocomplete="off";
    const go = document.createElement("button"); go.type="button"; go.className="srchbtn"; go.textContent="검색";
    bar.appendChild(inp); bar.appendChild(go); c.appendChild(bar);
    const chosen = document.createElement("div"); chosen.className="chosen"; chosen.id="favChosen"; c.appendChild(chosen);
    const res = document.createElement("div"); res.className="movie-grid"; res.id="favResults"; c.appendChild(res);
    const hint = document.createElement("div"); hint.className="ghint"; hint.id="favHint"; c.appendChild(hint);
    go.onclick = () => doFavSearch(inp.value);
    inp.onkeydown = (e) => { if(e.key === "Enter"){ e.preventDefault(); doFavSearch(inp.value); } };
    renderChosen();
  } else if (s.type === "grid") {
    c.innerHTML = '<div class="movie-grid" id="gridResults"></div><div class="ghint" id="gridStatus">불러오는 중…</div>';
    loadGrid();
  } else {
    const d = document.createElement("div"); d.className = "soon"; d.textContent = "이 단계는 곧 열려요.";
    c.appendChild(d);
  }
}

async function save(payload){
  const { status, data } = await api("/api/prefs", { method:"POST", body: JSON.stringify(payload) });
  if (status === 401) { location.href = "/auth.html?mode=login"; return false; }
  if (!data.ok) { showErr(data.error || "저장에 실패했어요. 잠시 후 다시 시도해주세요."); return false; }
  return true;
}
function payloadFor(stepIndex, includeData){
  const s = STEPS[stepIndex];
  const p = { step: stepIndex + 1 };
  if (includeData) {
    if (s.key === "theaters")  p.theaters  = [...sel.theaters].map(v => ({ chain:v }));
    if (s.key === "providers") p.providers = [...sel.providers];
    if (s.key === "favorites") p.favorites = sel.favorites.map((m,idx) => ({ tmdb_id:m.tmdb_id, rank:idx }));
    if (s.key === "watchlist") p.watchlist = [...sel.watch.values()].map(m => ({ tmdb_id:m.tmdb_id, status:"want" }));
  }
  if (stepIndex === STEPS.length - 1) p.done = 1;
  return p;
}
async function advance(includeData){
  $("nextBtn").disabled = true; $("skipBtn").disabled = true;
  const ok = await save(payloadFor(i, includeData));
  $("nextBtn").disabled = false; $("skipBtn").disabled = false;
  if (!ok) return;
  if (i === STEPS.length - 1) return finish();
  i++; render();
}
function finish(){
  $("card").innerHTML =
    '<div class="done"><h1>항해 준비 완료 ⛵</h1>' +
    '<p class="sub">내 프로필로 이동할게요…</p>' +
    '<a class="go" href="/profile.html">내 프로필 보기</a></div>';
  setTimeout(function(){ location.href = "/profile.html"; }, 1200);
}

$("nextBtn").onclick = () => advance(true);
$("skipBtn").onclick = () => advance(false);
$("backBtn").onclick = () => { if (i>0){ i--; render(); } };

(async () => {
  const me = await api("/api/me");
  if (me.status === 401 || !me.data.ok) { location.href = "/auth.html?mode=login"; return; }
  const pf = await api("/api/prefs");
  if (pf.data && pf.data.ok) {
    (pf.data.theaters || []).forEach(t => sel.theaters.add(t.chain));
    (pf.data.providers || []).forEach(p => sel.providers.add(p));
    (pf.data.watchlist || []).forEach(w => prefillWatch.add(w.tmdb_id));
    const step = (pf.data.onboarding && pf.data.onboarding.step) || 0;
    if (step > 0 && step < STEPS.length) i = step;
  }
  render();
})();
</script>
</body>
</html>
