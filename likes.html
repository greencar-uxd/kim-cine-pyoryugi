<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>김씨네표류기 — 내 좋아요</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
<style>
  :root{--ink:#131215;--screen:#FAF8F4;--signal:#F4562B;--signal-text:#C7401A;--fog:#E9E5DD;--caption:#6B665D;--placeholder:#A8A29A;
    --serif:'Noto Serif KR','Noto Serif CJK KR','Apple Myungjo',serif;
    --kr:'Pretendard Variable','Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    --mono:'Pretendard Variable','Pretendard',-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--screen);color:var(--ink);font-family:var(--kr);min-height:100svh}
  .wrap{width:min(600px,100%);margin:0 auto;padding:0 20px 96px}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;background:var(--screen);padding:16px 0;border-bottom:1px solid var(--fog)}
  .topbar .brand{font-family:var(--serif);font-weight:700;font-size:20px;letter-spacing:-.02em;color:var(--ink);text-decoration:none}
  .topbar .mine{font-size:13px;color:var(--caption);text-decoration:none}
  .topbar .mine:hover{color:var(--signal-text)}
  .phead{padding:28px 0 4px}
  .phead h1{font-family:var(--serif);font-weight:700;font-size:24px}
  .phead p{font-size:13px;color:var(--caption);margin-top:8px;line-height:1.6}
  .tabs{display:flex;gap:8px;margin:20px 0 4px}
  .tab{font-family:var(--kr);font-size:14px;font-weight:600;border:1px solid var(--fog);background:#fff;color:var(--caption);border-radius:99px;padding:8px 16px;cursor:pointer}
  .tab.on{background:var(--ink);color:var(--screen);border-color:var(--ink)}
  .tab span{font-family:var(--mono);font-size:12px;opacity:.75;margin-left:2px}
  .sec{margin-top:18px}
  .empty-note{font-size:13.5px;color:var(--placeholder);line-height:1.7;padding:28px 2px}
  .empty-note a{color:var(--signal-text);text-decoration:none}
  .lr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .lrc{position:relative;cursor:pointer;background:none;border:0;padding:0;font-family:var(--kr);display:block;text-align:left}
  .lrc .pos{position:relative}
  .lrc img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:10px;background:var(--fog);display:block}
  .lrc .noimg{width:100%;aspect-ratio:2/3;border-radius:10px;background:var(--fog);display:flex;align-items:center;justify-content:center;color:var(--placeholder);font-size:22px}
  .lrc .rate{position:absolute;left:6px;bottom:6px;display:inline-flex;align-items:center;gap:3px;background:rgba(19,18,21,.72);color:#fff;border-radius:6px;padding:2px 6px;font-family:var(--mono);font-size:10.5px;font-weight:600}
  .lrc .rate .st{color:var(--signal);font-size:10px}
  .lrc .lr-by{display:block;font-size:11px;color:var(--caption);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .lrc .lr-by b{color:var(--ink);font-weight:600}
  .wc{position:relative;display:block}
  .wc img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:10px;background:var(--fog);display:block}
  .wc .noimg{width:100%;aspect-ratio:2/3;border-radius:10px;background:var(--fog);display:flex;align-items:center;justify-content:center;color:var(--placeholder);font-size:22px}
  .wc .wt{display:block;font-size:11px;color:var(--caption);margin-top:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .wc .wdel{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;border:0;background:rgba(19,18,21,.66);color:#fff;font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .wc .wdel:disabled{opacity:.5;cursor:default}
  .lc-list{display:flex;flex-direction:column;gap:10px}
  .lcc{background:#fff;border:1px solid var(--fog);border-radius:14px;padding:13px 15px;cursor:pointer;text-align:left;width:100%;font-family:var(--kr);display:block}
  .lcc:hover{border-color:var(--ink)}
  .lcc .lc-b{font-size:14px;color:var(--ink);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .lcc .lc-by{font-size:12px;color:var(--placeholder);margin-top:7px}
  .lcc .lc-by b{color:var(--caption);font-weight:600}
  .loading{padding:80px 0;text-align:center;color:var(--caption);font-size:14px}
  .overlay{position:fixed;inset:0;background:rgba(19,18,21,.44);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
  .overlay.open{display:flex}
  .modal{width:min(420px,100%);background:var(--screen);border:1px solid var(--fog);border-radius:18px;padding:24px 22px;max-height:90svh;overflow:auto;box-shadow:0 20px 60px rgba(19,18,21,.22)}
  .post-modal{width:min(460px,100%)}
  .post-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .post-head .pa{width:38px;height:38px;flex:0 0 38px;border-radius:50%;background:#fff;border:1px solid var(--fog);display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden}
  .post-head .pa img{width:100%;height:100%;object-fit:cover}
  .post-head .pn{font-weight:600;font-size:15px;color:var(--ink)}
  .post-head .px{margin-left:auto;background:none;border:0;cursor:pointer;color:var(--caption);font-size:24px;line-height:1;padding:2px 4px}
  .post-hero{display:flex;gap:14px;margin-bottom:14px}
  .post-hero .hp{width:104px;flex:0 0 104px}
  .post-hero .hp img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:10px;background:var(--fog);display:block}
  .post-hero .hp .noimg{width:100%;aspect-ratio:2/3;border-radius:10px;background:var(--fog);display:flex;align-items:center;justify-content:center;color:var(--placeholder);font-size:22px}
  .post-hero .hm{flex:1;min-width:0}
  .post-hero .hm .ht{font-size:15.5px;font-weight:700;color:var(--ink);line-height:1.35}
  .post-hero .hm .ht .yr{color:var(--placeholder);font-weight:400;font-size:13px;margin-left:5px}
  .post-hero .hm .hr{display:flex;align-items:center;gap:7px;margin-top:8px}
  .post-hero .hm .hr .rn{font-family:var(--mono);font-size:12px;color:var(--caption)}
  .post-cap{font-size:14.5px;color:var(--ink);line-height:1.6;margin-bottom:6px}
  .post-cap .ol{font-weight:600}
  .post-cap .bd{color:var(--caption);margin-top:6px;white-space:pre-wrap}
  .post-actions{display:flex;align-items:center;gap:10px;padding:12px 0;margin-top:8px;border-top:1px solid var(--fog);border-bottom:1px solid var(--fog)}
  .lk{display:inline-flex;align-items:center;gap:6px;background:none;border:0;cursor:pointer;font-family:var(--kr);color:var(--ink);padding:2px}
  .lk svg{width:23px;height:23px;display:block;stroke:var(--ink);fill:none;stroke-width:1.7;transition:transform .1s}
  .lk.on svg{fill:var(--signal);stroke:var(--signal)}
  .lk:active svg{transform:scale(.84)}
  .lk:disabled{cursor:default;opacity:.45}
  .cmt .cmeta button:disabled{cursor:default;opacity:.45}
  .lk .lc{font-family:var(--mono);font-size:13px;min-width:8px}
  .post-actions .cc{display:inline-flex;align-items:center;gap:5px;font-size:13.5px;color:var(--caption)}
  .cmt-list{margin:14px 0 4px;display:flex;flex-direction:column;gap:15px;max-height:34svh;overflow:auto}
  .cmt{display:flex;gap:10px}
  .cmt .ca{width:30px;height:30px;flex:0 0 30px;border-radius:50%;background:#fff;border:1px solid var(--fog);display:flex;align-items:center;justify-content:center;font-size:15px;overflow:hidden}
  .cmt .ca img{width:100%;height:100%;object-fit:cover}
  .cmt .cmain{flex:1;min-width:0}
  .cmt .cn{font-weight:600;font-size:13px;color:var(--ink)}
  .cmt .cb{font-size:13.5px;color:var(--ink);line-height:1.5;margin-top:2px;word-break:break-word}
  .cmt .cmeta{display:flex;align-items:center;gap:14px;margin-top:5px;font-size:11px;color:var(--placeholder)}
  .cmt .cmeta button{background:none;border:0;cursor:pointer;font-size:11px;color:var(--placeholder);font-family:var(--kr);padding:0}
  .cmt .cmeta button.clk.on{color:var(--signal-text);font-weight:600}
  .cmt-empty{font-size:13px;color:var(--placeholder);padding:6px 0}
  .cmt-err{font-size:12px;color:#9C2B12;margin-top:8px}
  .cmt-add{display:flex;gap:8px;align-items:flex-end;margin-top:12px;border-top:1px solid var(--fog);padding-top:14px}
  .cmt-add textarea{flex:1;font-family:var(--kr);font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--fog);border-radius:10px;padding:9px 11px;outline:none;resize:none;line-height:1.5;max-height:100px}
  .cmt-add textarea:focus{border-color:var(--ink)}
  .cmt-add button{flex:0 0 auto;font-family:var(--kr);font-size:14px;font-weight:600;background:var(--ink);color:var(--screen);border:0;border-radius:10px;padding:10px 16px;cursor:pointer}
  .cmt-add button:disabled{opacity:.4;cursor:default}
  @media (max-width:480px){ .wrap{padding:0 16px 80px} }
</style>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a class="brand" href="/">김씨네표류기</a>
      <a class="mine" href="/profile.html">내 프로필 →</a>
    </div>
    <div class="phead">
      <h1>내 보관함</h1>
      <p>보고싶은 영화와 좋아요한 한줄평·댓글을 모아둔 곳이에요. (앞으로 모임·소식도 여기 모여요)</p>
    </div>
    <div class="tabs">
      <button class="tab on" id="tabW" type="button">보고싶어요<span id="cntW"></span></button>
      <button class="tab" id="tabR" type="button">리뷰<span id="cntR"></span></button>
      <button class="tab" id="tabC" type="button">댓글<span id="cntC"></span></button>
    </div>
    <div id="body"><div class="loading">불러오는 중…</div></div>
  </div>

  <div class="overlay" id="overlayPost">
    <div class="modal post-modal" role="dialog" aria-modal="true">
      <div id="postBody"><div class="loading" style="padding:40px 0">불러오는 중…</div></div>
    </div>
  </div>

<script>
const API = "https://api.kim-cine-pyoryugi.kr";
const OTT={netflix:"넷플릭스",tving:"티빙",coupang:"쿠팡플레이",wavve:"웨이브",disney:"디즈니+",watcha:"왓챠",laftel:"라프텔",appletv:"Apple TV+"};
const $ = (id) => document.getElementById(id);
const esc = (s) => String(s==null?"":s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const state = { det:{}, providers:{}, likes:{reviews:[],comments:[]}, watch:[], tab:"W", loading:false };

async function api(path, opts){
  const r = await fetch(API + path, Object.assign({ credentials:"include", headers:{ "Content-Type":"application/json" } }, opts||{}));
  return { status:r.status, data: await r.json().catch(()=>({})) };
}
async function fetchDetails(ids){ if(!ids.length) return {}; const {data}=await api("/api/movies/details?ids="+ids.join(",")); const m={}; (data.results||[]).forEach(x=>m[x.tmdb_id]=x); return m; }
async function fetchProviders(ids){ if(!ids.length) return {}; const {data}=await api("/api/movies/providers?ids="+ids.join(",")); return (data&&data.providers)||{}; }
function starsHtml(rating){ const p=Math.max(0,Math.min(10,rating||0))*10; return '<span class="stars" style="--p:'+p+'%;display:inline-block;font-size:14px;letter-spacing:1px;line-height:1;background:linear-gradient(90deg,var(--signal) '+p+'%,#D9D4CA '+p+'%);-webkit-background-clip:text;background-clip:text;color:transparent">★★★★★</span>'; }
function ottHtml(slugs){ if(!slugs||!slugs.length) return ''; return '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:8px">'+slugs.map(s=>'<span style="font-size:11px;font-weight:600;color:var(--ink);background:var(--screen);border:1px solid var(--fog);border-radius:6px;padding:3px 7px">'+esc(OTT[s]||s)+'</span>').join('')+'</div>'; }
function fmtTime(ts){
  if(!ts) return "";
  const t = Date.parse(String(ts).replace(" ","T")+"Z"); if(isNaN(t)) return "";
  const diff=(Date.now()-t)/1000;
  if(diff<60) return "방금"; if(diff<3600) return Math.floor(diff/60)+"분 전";
  if(diff<86400) return Math.floor(diff/3600)+"시간 전"; if(diff<2592000) return Math.floor(diff/86400)+"일 전";
  return String(ts).slice(0,10).replace(/-/g,".");
}
const HEART = '<svg viewBox="0 0 24 24"><path d="M12 21s-7.6-4.7-10.1-9.3C.3 8.4 2 4.8 5.4 4.8c2 0 3.4 1.2 4.3 2.5l.3.4.3-.4c.9-1.3 2.3-2.5 4.3-2.5 3.4 0 5.1 3.6 3.5 6.9C19.6 16.3 12 21 12 21z"/></svg>';

/* ---- 게시물 상세 (인스타식) ---- */
const post = { id:null, data:null, busy:false, changed:false };
async function openPost(reviewId){
  post.id = reviewId; post.data = null;
  $("postBody").innerHTML = '<div class="loading" style="padding:40px 0">불러오는 중…</div>';
  $("overlayPost").classList.add("open");
  const { status, data } = await api("/api/review?id=" + encodeURIComponent(reviewId));
  if(status !== 200 || !data.ok){ $("postBody").innerHTML = '<div class="loading" style="padding:40px 0">'+esc((data&&data.error)||"불러오지 못했어요.")+'</div>'; return; }
  post.data = data;
  const tid = data.review.tmdb_id;
  if(!state.det[tid]){ const dd = await fetchDetails([tid]); Object.assign(state.det, dd); }
  if(!state.providers[tid]){ const pv = await fetchProviders([tid]); Object.assign(state.providers, pv); }
  renderPost();
}
function closePost(){
  $("overlayPost").classList.remove("open"); post.id=null; post.data=null;
  if(post.changed){ post.changed=false; loadLikes(); }
}
function renderPost(){
  const d = post.data; if(!d) return;
  const r = d.review, a = r.author || {}, m = state.det[r.tmdb_id] || {};
  const title = m.title || ("영화 #"+r.tmdb_id);
  const poster = m.poster || "";
  const av = a.avatar_url ? '<img src="'+esc(a.avatar_url)+'" alt="">' : esc(a.emoji||"🐥");
  let html = '';
  html += '<div class="post-head"><div class="pa">'+av+'</div><div class="pn">'+esc(a.nickname||"선원")+'</div><button class="px" id="postX" aria-label="닫기">×</button></div>';
  html += '<div class="post-hero"><div class="hp">'+(poster?'<img src="'+esc(poster)+'" alt="">':'<div class="noimg">🎬</div>')+'</div>'+
    '<div class="hm"><div class="ht">'+esc(title)+(m.year?'<span class="yr">'+esc(m.year)+'</span>':'')+'</div>'+
    '<div class="hr">'+starsHtml(r.rating)+'<span class="rn">'+(r.rating/2).toFixed(1)+'</span></div>'+
    ottHtml(state.providers[r.tmdb_id])+'</div></div>';
  html += '<div class="post-cap">'+(r.one_liner?'<div class="ol">'+esc(r.one_liner)+'</div>':'')+(r.body?'<div class="bd">'+esc(r.body)+'</div>':'')+'</div>';
  html += '<div class="post-actions">'+
    '<button class="lk'+(d.liked_by_me?' on':'')+(r.is_mine?' mine':'')+'" id="postLike" aria-label="좋아요"'+(r.is_mine?' disabled':'')+'>'+HEART+'<span class="lc" id="postLikeC">'+(d.like_count||0)+'</span></button>'+
    '<span class="cc">💬 <span id="postCmtC">'+(d.comments||[]).length+'</span></span>'+
    '</div>';
  html += '<div class="cmt-list" id="cmtList"></div>';
  html += '<div class="cmt-err" id="cmtErr"></div>';
  html += '<div class="cmt-add"><textarea id="cmtInput" rows="1" maxlength="500" placeholder="댓글 달기…"></textarea><button id="cmtSend" type="button">등록</button></div>';
  $("postBody").innerHTML = html;
  $("postX").onclick = closePost;
  $("postLike").onclick = togglePostLike;
  $("cmtSend").onclick = sendComment;
  const ta = $("cmtInput");
  ta.addEventListener("input", () => { ta.style.height="auto"; ta.style.height=Math.min(100, ta.scrollHeight)+"px"; $("cmtErr").textContent=""; });
  ta.addEventListener("keydown", (e) => { if(e.key==="Enter" && (e.metaKey||e.ctrlKey)){ e.preventDefault(); sendComment(); } });
  renderComments();
}
function renderComments(){
  const list = $("cmtList"); if(!list) return;
  const cs = (post.data && post.data.comments) || [];
  if(!cs.length){ list.innerHTML = '<div class="cmt-empty">아직 댓글이 없어요. 첫 댓글을 남겨보세요.</div>'; return; }
  list.innerHTML = "";
  cs.forEach(c => {
    const av = c.avatar_url ? '<img src="'+esc(c.avatar_url)+'" alt="">' : esc(c.emoji||"🐥");
    const el = document.createElement("div"); el.className = "cmt";
    el.innerHTML = '<div class="ca">'+av+'</div><div class="cmain">'+
      '<div class="cn">'+esc(c.nickname||"선원")+'</div>'+
      '<div class="cb">'+esc(c.body)+'</div>'+
      '<div class="cmeta"><span>'+fmtTime(c.created_at)+'</span>'+
        '<button class="clk'+(c.liked_by_me?' on':'')+(c.is_mine?' mine':'')+'" type="button"'+(c.is_mine?' disabled':'')+'>♥ <span>'+(c.like_count||0)+'</span></button>'+
        (c.can_delete?'<button class="cdel" type="button">삭제</button>':'')+
      '</div></div>';
    el.querySelector(".clk").onclick = () => toggleCommentLike(c);
    const del = el.querySelector(".cdel"); if(del) del.onclick = () => removeComment(c);
    list.appendChild(el);
  });
}
async function togglePostLike(){
  if(post.busy || !post.data) return; post.busy = true;
  const d = post.data; const want = !d.liked_by_me;
  const { status, data } = await api(want?"/api/like":"/api/unlike", { method:"POST", body: JSON.stringify({ type:"review", id: d.review.id }) });
  post.busy = false;
  if(status===200 && data.ok){
    d.liked_by_me = data.liked; d.like_count = data.count; post.changed = true;
    const btn=$("postLike"), c=$("postLikeC"); if(btn) btn.classList.toggle("on", data.liked); if(c) c.textContent = data.count;
  }
}
async function toggleCommentLike(c){
  if(post.busy) return; post.busy = true;
  const want = !c.liked_by_me;
  const { status, data } = await api(want?"/api/like":"/api/unlike", { method:"POST", body: JSON.stringify({ type:"comment", id: c.id }) });
  post.busy = false;
  if(status===200 && data.ok){ c.liked_by_me = data.liked; c.like_count = data.count; post.changed = true; renderComments(); }
}
async function sendComment(){
  if(post.busy || !post.data) return;
  const ta = $("cmtInput"); const body = (ta.value||"").trim();
  if(!body){ return; }
  post.busy = true; const btn = $("cmtSend"); btn.disabled = true;
  const { status, data } = await api("/api/comments", { method:"POST", body: JSON.stringify({ review_id: post.data.review.id, body }) });
  post.busy = false; btn.disabled = false;
  if(status===200 && data.ok && data.comment){
    post.data.comments.push(data.comment);
    ta.value = ""; ta.style.height = "auto";
    $("postCmtC").textContent = post.data.comments.length;
    renderComments();
    const list=$("cmtList"); if(list) list.scrollTop = list.scrollHeight;
  } else {
    $("cmtErr").textContent = (data && data.error) || "댓글 등록에 실패했어요.";
  }
}
async function removeComment(c){
  if(post.busy) return; post.busy = true;
  const { status, data } = await api("/api/comments/delete", { method:"POST", body: JSON.stringify({ id: c.id }) });
  post.busy = false;
  if(status===200 && data.ok){
    post.data.comments = (post.data.comments||[]).filter(x=>x.id!==c.id);
    const cc=$("postCmtC"); if(cc) cc.textContent = post.data.comments.length;
    post.changed = true; renderComments();
  }
}
$("overlayPost").addEventListener("click", (e) => { if(e.target === $("overlayPost")) closePost(); });
document.addEventListener("keydown", (e) => { if(e.key === "Escape") closePost(); });

/* ---- 좋아요 목록 렌더 ---- */
function renderLikes(){
  const body = $("body");
  const L = state.likes;
  $("cntR").textContent = (L.reviews||[]).length ? " "+L.reviews.length : "";
  $("cntC").textContent = (L.comments||[]).length ? " "+L.comments.length : "";
  $("cntW").textContent = (state.watch||[]).length ? " "+state.watch.length : "";
  if(state.tab === "W"){
    const ws = state.watch || [];
    if(!ws.length){ body.innerHTML = '<div class="empty-note">아직 보고싶은 영화가 없어요.<br>영화를 검색해 <b>＋ 보고싶어요</b>로 담아보세요. · <a href="/profile.html">프로필에서 담기</a></div>'; return; }
    body.innerHTML = "";
    const grid = document.createElement("div"); grid.className = "lr-grid";
    ws.forEach(w => {
      const m = state.det[w.tmdb_id] || {};
      const poster = m.poster || "";
      const title = m.title || ("영화 #"+w.tmdb_id);
      const cell = document.createElement("div"); cell.className = "wc";
      cell.innerHTML =
        (poster?'<img loading="lazy" src="'+esc(poster)+'" alt="'+esc(title)+'">':'<div class="noimg">🎬</div>')+
        '<button class="wdel" type="button" title="빼기" aria-label="보고싶어요에서 빼기">×</button>'+
        '<span class="wt">'+esc(title)+'</span>';
      cell.querySelector(".wdel").onclick = () => removeWatch(w, cell.querySelector(".wdel"));
      grid.appendChild(cell);
    });
    body.appendChild(grid);
    return;
  }
  if(state.tab === "R"){
    const revs = L.reviews || [];
    if(!revs.length){ body.innerHTML = '<div class="empty-note">아직 좋아요한 한줄평이 없어요.<br>선원들 프로필에서 마음에 드는 한줄평에 ♥를 눌러보세요.</div>'; return; }
    body.innerHTML = "";
    const grid = document.createElement("div"); grid.className = "lr-grid";
    revs.forEach(r => {
      const m = state.det[r.tmdb_id] || {};
      const poster = m.poster || "";
      const cell = document.createElement("button"); cell.type="button"; cell.className="lrc";
      cell.innerHTML =
        '<div class="pos">'+
          (poster?'<img loading="lazy" src="'+esc(poster)+'" alt="">':'<div class="noimg">🎬</div>')+
          '<div class="rate"><span class="st">★</span>'+(r.rating/2).toFixed(1)+'</div>'+
        '</div>'+
        '<span class="lr-by"><b>'+esc(r.author||"선원")+'</b>'+(r.one_liner?' · '+esc(r.one_liner):'')+'</span>';
      cell.onclick = () => openPost(r.review_id);
      grid.appendChild(cell);
    });
    body.appendChild(grid);
  } else {
    const cms = L.comments || [];
    if(!cms.length){ body.innerHTML = '<div class="empty-note">아직 좋아요한 댓글이 없어요.<br>한줄평에 달린 댓글에도 ♥를 누를 수 있어요.</div>'; return; }
    body.innerHTML = "";
    const list = document.createElement("div"); list.className = "lc-list";
    cms.forEach(c => {
      const cell = document.createElement("button"); cell.type="button"; cell.className="lcc";
      cell.innerHTML = '<div class="lc-b">'+esc(c.body)+'</div><div class="lc-by"><b>'+esc(c.author||"선원")+'</b> 님의 댓글 · 눌러서 원글 보기</div>';
      cell.onclick = () => openPost(c.review_id);
      list.appendChild(cell);
    });
    body.appendChild(list);
  }
}
async function loadLikes(){
  if(state.loading) return; state.loading = true;
  const [lk, pf] = await Promise.all([ api("/api/likes"), api("/api/prefs") ]);
  state.loading = false;
  if(lk.status===401 || pf.status===401){ location.href="/auth.html?mode=login"; return; }
  if(!lk.data.ok){ $("body").innerHTML = '<div class="empty-note">불러오지 못했어요. 잠시 후 다시 시도해주세요.</div>'; return; }
  state.likes = { reviews: lk.data.reviews||[], comments: lk.data.comments||[] };
  state.watch = ((pf.data&&pf.data.watchlist)||[]).filter(w => w.status !== 'seen');
  const ids = [...new Set([].concat((state.likes.reviews||[]).map(r=>r.tmdb_id), state.watch.map(w=>w.tmdb_id)))];
  if(ids.length){ const det = await fetchDetails(ids); Object.assign(state.det, det); }
  renderLikes();
}
function setTab(t){ state.tab=t; ["W","R","C"].forEach(x=>$("tab"+x).classList.toggle("on", x===t)); renderLikes(); }
$("tabW").onclick = () => setTab("W");
$("tabR").onclick = () => setTab("R");
$("tabC").onclick = () => setTab("C");
async function removeWatch(w, btn){
  if(btn.disabled) return; btn.disabled = true;
  const { status, data } = await api("/api/watchlist", { method:"POST", body: JSON.stringify({ tmdb_id: w.tmdb_id, want:false }) });
  if(status===401){ location.href="/auth.html?mode=login"; return; }
  if(status===200 && data.ok){ state.watch = (state.watch||[]).filter(x=>x.tmdb_id!==w.tmdb_id); renderLikes(); }
  else { btn.disabled = false; }
}

(async () => {
  const me = await api("/api/me");
  if(me.status===401 || !me.data.ok){ location.href="/auth.html?mode=login"; return; }
  loadLikes();
})();
</script>
